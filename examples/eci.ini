# Minimal eci.ini for ETI Eloquence 6.1 (Apple's tvOS 18.2 build).
#
# The engine's internal config-table buffers are smaller in 18.2 than 16.4 --
# specifically the Phoneme/Voice tuning entries from older eci.ini distributions
# (e.g. LevelStar's) overflow an internal buffer and crash during eciAddText.
# This minimal form uses the engine's built-in voice/phoneme defaults, which
# produce fully-intelligible speech.
#
# Update Path= to point at the absolute path to your language module .so
# (e.g. enu.so for US English, jpn.so for Japanese, chs.so for Chinese
# Simplified). See docs/03-integration.md for the full available set.

[1.0]
Path=/absolute/path/to/your/enu.so
Version=6.1
