# sd_eloquence -- speech-dispatcher output module for ECI 6.x.
# See README for installation; restart speech-dispatcher after edits.

# 0 = silent, 1 = trace to stderr.
Debug 0

# Directory holding eci.so, the language .so files, and the
# install-generated eci.ini. The install step writes this dir; the
# module chdirs here at startup so the engine finds eci.ini.
EloquenceDataDir /usr/lib/eloquence

# Engine sample rate: 0=8 kHz, 1=11025 Hz, 2=22050 Hz.
# Apple's eci.dylib only supports 0 and 1; rejected values fall
# back to 11025.
EloquenceSampleRate 1

# ---- Optional libsoxr resampling --------------------------------------
# Apple's "Higher sample rate" toggle in VoiceOver is the same thing:
# resample the engine's 11025 Hz output to something cleaner on a modern
# DAC. Uncomment at most one rate.
#   EloquenceResampleRate 16000
#   EloquenceResampleRate 22050
#   EloquenceResampleRate 32000
#   EloquenceResampleRate 44100
#   EloquenceResampleRate 48000
#
# Quality recipe (default very-high). Lower = cheaper filter.
#   EloquenceResampleQuality quick | low | medium | high | very-high
#
# Phase response (default intermediate). Linear = symmetric ringing;
# minimum = all-after-transient, useful for percussive sources, of
# little benefit to speech.
#   EloquenceResamplePhase intermediate | linear | minimum
#
# Steep cutoff filter -- preserves more HF at the cost of more ringing.
# Speech doesn't have much near Nyquist so this is rarely useful.
#   EloquenceResampleSteep 1

# Default voice: 0..7 slot index or one of
#   Reed Shelley Sandy Rocko Flo Grandma Grandpa Eddy
# (French shows Reed as "Jacques".)
EloquenceDefaultVoice Reed

# Default language: IETF tag (en, en-US, de-DE, ...) or raw ECI hex.
# Supported: en-US en-GB es-ES es-MX fr-FR fr-CA de-DE it-IT pt-BR fi-FI.
# (CJK is built but currently gated out; see sd_eloquence.c.)
EloquenceDefaultLanguage en-US

# ---- User dictionaries -----------------------------------------------
# When enabled (default), the module loads per-language pronunciation
# dictionary files at engine startup, mirroring NVDA-IBMTTS's behavior.
# The engine reads four kinds per language ($LANG = "enu", "fra", ...):
#     $LANG.dic     main words
#     $LANG.abr     abbreviation expansions
#     $LANG.phr     phrasal substitutions
#     $LANG.rul     transformation rules
# Missing files are silently skipped. See ECI 6.x docs for the
# dictionary file format.
#
#   EloquenceUseDictionaries 1
#
# Where to look for them. The default derives from EloquenceDataDir as
# "${EloquenceDataDir}/dicts".  Set this if you keep your dictionaries
# elsewhere (e.g. under $HOME so they survive uninstall).
#
#   EloquenceDictionaryDir /usr/lib/eloquence/dicts

# ---- Synthesis tweaks ------------------------------------------------
# Phrase prediction: prepends "`pp1" to each utterance, telling the
# engine to look ahead for phrase boundaries before choosing intonation.
# Produces more natural prosody on longer sentences but adds a touch of
# latency. NVDA exposes this as "Phrase prediction" in its IBMTTS
# settings panel.
#
#   EloquencePhrasePrediction 0

# ---- Advanced / debugging --------------------------------------------
# Backquote pass-through: by default the module sanitizes user-supplied
# text by replacing backticks ("`") with spaces so untrusted text can't
# inject ECI annotation commands (eg "`vv0" to mute). Enable only if you
# control all upstream text sources and want to hand-author ECI tags.
#
#   EloquenceBackquoteTags 0
