# Speech Dispatcher configuration for sd_eloquence (ETI Eloquence / ECI 6.x).
#
# Speech-dispatcher passes the path to this file as argv[1] to the module
# binary at startup.
#
# To activate this module:
#   1. Build & install the parent project (see README).
#   2. Make sure the language modules are installed: this requires the
#      `cmake -DINSTALL_PREBUILT_DYLIBS=ON` configure flag, which drops
#      eci.so, the 14 language modules, and a multi-section eci.ini into
#      ${CMAKE_INSTALL_PREFIX}/lib/eloquence/ (typically /usr/lib/eloquence).
#   3. Edit the keys below if your install lives somewhere else.
#   4. Restart speech-dispatcher: `systemctl --user restart speech-dispatcher`
#         (or `pkill speech-dispatcher` and let it relaunch on next request)
#
# Speech-dispatcher auto-discovers modules whose binary lives under
# /usr/lib/speech-dispatcher-modules/ and whose config file is present at
# /etc/speech-dispatcher/modules/<name>.conf, so no edits to speechd.conf
# are required.

# 0 = silent (default). 1 = print engine traces to stderr (speech-dispatcher
# captures these in its log when run with --log-level=4+).
Debug 0

# ------------------------------------------------------------------------------
# DATA DIRECTORY
# ------------------------------------------------------------------------------
#
# Directory holding eci.so, the 14 language modules (enu.so, eng.so, deu.so,
# fra.so, ita.so, jpn.so, kor.so, chs.so, cht.so, esp.so, esm.so, frc.so,
# ptb.so, fin.so) and the auto-generated multi-section eci.ini.
#
# The install step writes this directory; sd_eloquence chdirs into it at
# startup so the engine's eci.ini-parsing static constructor finds the
# right file. With it set correctly, every supported language is available
# at runtime and no further config is needed -- speech-dispatcher's
# `language=` setting picks the dialect.

EloquenceDataDir /usr/lib/eloquence

# ------------------------------------------------------------------------------
# ENGINE OUTPUT
# ------------------------------------------------------------------------------

# Engine output sample rate code. The actual ECI parameter is param 5
# (eciSampleRate). Valid values:
#   0 = 8000 Hz   (narrow-band, "telephone")
#   1 = 11025 Hz  (default; Apple's eci.dylib only supports 0 and 1)
#   2 = 22050 Hz  (Speechworks/IBMTTS era; rejected by Apple's build)
#
# If the engine rejects the chosen value at init, sd_eloquence falls back
# to 11025 Hz automatically.
EloquenceSampleRate 1

# ------------------------------------------------------------------------------
# OUTPUT RESAMPLING (optional, via libsoxr)
# ------------------------------------------------------------------------------
#
# Apple's eci.dylib won't synthesize above 11025 Hz natively, but the audio
# sounds noticeably smoother on modern DACs after resampling. This mirrors
# what Apple's "Higher sample rate" toggle in VoiceOver does internally
# (they use AVAudioConverter for the same purpose).
#
# Uncomment AT MOST ONE EloquenceResampleRate target. Leaving everything
# commented disables resampling and the module sends engine PCM straight
# through at EloquenceSampleRate (11025 Hz by default).
#
# Available targets -- uncomment one:
#   EloquenceResampleRate 16000     # voice-codec quality
#   EloquenceResampleRate 22050     # what Speechworks/IBMTTS era output natively
#   EloquenceResampleRate 32000     # higher rate, slightly cheaper than 44.1k
#   EloquenceResampleRate 44100     # CD quality
#   EloquenceResampleRate 48000     # modern DAC native -- best for clean reconstruction

# --- Resampler quality (filter taps, CPU/latency cost) ---
# Default = very-high (sox -v equivalent). Lower settings use cheaper filters.
#   EloquenceResampleQuality very-high   # SOXR_VHQ (default if not specified)
#   EloquenceResampleQuality high        # SOXR_HQ
#   EloquenceResampleQuality medium      # SOXR_MQ
#   EloquenceResampleQuality low         # SOXR_LQ
#   EloquenceResampleQuality quick       # SOXR_QQ -- minimal CPU, most artifacts

# --- Filter phase response ---
# Default = intermediate (sox's `rate -v` default; smallest pre-echo with
# acceptable post-ringing). Linear phase has symmetric ringing around
# transients; minimum phase pushes ALL ringing AFTER the transient (no
# pre-echo, useful for percussive sounds but unnecessary for speech).
#   EloquenceResamplePhase intermediate  # default
#   EloquenceResamplePhase linear        # symmetric, classic sinc
#   EloquenceResamplePhase minimum       # all-after-transient

# --- Steep cutoff filter ---
# Narrower transition band = more high-frequency content preserved at the
# cost of a longer filter (more CPU, more ringing). For speech this rarely
# matters because the source has nothing near Nyquist anyway.
#   EloquenceResampleSteep 1

# ------------------------------------------------------------------------------
# DEFAULT VOICE
# ------------------------------------------------------------------------------
#
# Apple's Eloquence ships 8 named voices, each with a per-voice parameter
# set transcribed from KonaVoicePresets.plist. The voices appear in
# speech-dispatcher's voice list as "<name> (<language>)" for every
# supported language. Voice names are: Reed, Shelley, Sandy, Rocko, Flo,
# Grandma, Grandpa, Eddy. The French dialect uses "Jacques" in place of
# Reed (slot 0).
#
# Accepts a 0..7 slot index or a voice name. Default = 0 (Reed / Jacques).

EloquenceDefaultVoice Reed

# ------------------------------------------------------------------------------
# DEFAULT LANGUAGE
# ------------------------------------------------------------------------------
#
# Accepts an ISO 639-1 tag with optional region (en, en-US, de-DE, ja, ...)
# OR a raw ECI dialect code (decimal or 0x... hex).
#
# Supported languages:
#   en-US  American English        en-GB  British English
#   es-ES  Castilian Spanish       es-MX  Latin American Spanish
#   fr-FR  Standard French         fr-CA  Canadian French
#   de-DE  German                  it-IT  Italian
#   pt-BR  Brazilian Portuguese    fi-FI  Finnish
#   ja-JP  Japanese                ko-KR  Korean
#   zh-CN  Mandarin (Simplified)   zh-TW  Mandarin (Traditional)
#
# At runtime, speech-dispatcher's `language=` setting (sent over SSIP)
# switches between these on the fly -- no need to restart the module.

EloquenceDefaultLanguage en-US
