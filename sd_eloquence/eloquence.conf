# sd_eloquence -- speech-dispatcher output module for ECI 6.x.
# See README for installation; restart speech-dispatcher after edits.

# 0 = silent, 1 = trace to stderr.
Debug 0

# Directory holding eci.so, the language .so files, and the
# install-generated eci.ini. The install step writes this dir; the
# module chdirs here at startup so the engine finds eci.ini.
EloquenceDataDir /usr/lib/eloquence

# ---- Audio rate ------------------------------------------------------
# Two independent stages:
#
#   engine  --[EloquenceSampleRate]-->  optional libsoxr  --[EloquenceResampleRate]-->  speech-dispatcher
#
# EloquenceSampleRate is the engine's native synthesis rate.
# EloquenceResampleRate optionally upscales the result; see below.

# Engine sample rate: 0=8 kHz, 1=11025 Hz, 2=22050 Hz.
# Apple's eci.dylib only supports 0 and 1; rejected values fall
# back to 11025.
EloquenceSampleRate 1

# ---- Optional libsoxr resampling --------------------------------------
# Resample the engine's PCM to a higher rate before it reaches
# speech-dispatcher / the audio device. Uncomment at most one rate.
#   EloquenceResampleRate 16000
#   EloquenceResampleRate 22050
#   EloquenceResampleRate 32000
#   EloquenceResampleRate 44100
#   EloquenceResampleRate 48000
#
# Quality recipe (default very-high). Lower = cheaper filter.
#   EloquenceResampleQuality quick | low | medium | high | very-high
#
# Phase response (default intermediate). Linear = symmetric ringing;
# minimum = all-after-transient, useful for percussive sources, of
# little benefit to speech.
#   EloquenceResamplePhase intermediate | linear | minimum
#
# Steep cutoff filter -- preserves more HF at the cost of more ringing.
# Speech doesn't have much near Nyquist so this is rarely useful.
#   EloquenceResampleSteep 1

# Default voice: 0..7 slot index or one of
#   Reed Shelley Sandy Rocko Flo Grandma Grandpa Eddy
# (French shows Reed as "Jacques".)
EloquenceDefaultVoice Reed

# Default language: IETF tag (en, en-US, de-DE, ...) or raw ECI hex.
# Supported: en-US en-GB es-ES es-MX fr-FR fr-CA de-DE it-IT pt-BR fi-FI.
# (CJK is built but currently gated out; see docs/cjk-investigation/.)
EloquenceDefaultLanguage en-US

# ---- Voice tuning ----------------------------------------------------
# Per-voice ECI params (head size, roughness, breathiness, pitch
# baseline, pitch fluctuation) come from Apple's KonaVoicePresets.plist
# and are written to slot 0 when a voice is activated. The five keys
# below let you override individual params on whichever voice is
# currently active; speed and volume aren't here because they flow
# through speech-dispatcher's per-utterance prosody controls.
#
# Each is 0..100; unset (the default) keeps the preset's own value.
#
#   EloquenceHeadSize           50
#   EloquenceRoughness          10
#   EloquenceBreathiness        20
#   EloquencePitchBaseline      60
#   EloquencePitchFluctuation   40

# ---- User dictionaries -----------------------------------------------
# When enabled (default), the module loads per-language pronunciation
# dictionary files at engine startup. The engine reads three kinds per
# language ($LANG = "enu", "fra", ...):
#     $LANG.main.dic   main word list
#     $LANG.root.dic   root-word substitutions
#     $LANG.abbr.dic   abbreviation expansions (opt-in -- see below)
# Missing files are silently skipped. See ECI 6.x docs for the
# dictionary file format.
#
#   EloquenceUseDictionaries 1
#
# Where to look for them. The default derives from EloquenceDataDir as
# "${EloquenceDataDir}/dicts".  Set this if you keep your dictionaries
# elsewhere (e.g. under $HOME so they survive uninstall).
#
#   EloquenceDictionaryDir /usr/lib/eloquence/dicts
#
# Abbreviation expansion is OFF by default because the bundled Apple
# .abr files silently rewrite tokens that look like abbreviations,
# which is surprising and unhelpful in screen-reader contexts. Set
# this to 1 to opt in; ignored when EloquenceUseDictionaries is 0.
#
#   EloquenceLoadAbbrDict 0

# ---- Synthesis tweaks ------------------------------------------------
# Phrase prediction: prepends "`pp1" to each utterance, telling the
# engine to look ahead and reshape prosody at predicted phrase
# boundaries. Some find the resulting intonation natural; others
# (including this author) find it intrusive. NVDA exposes the same
# toggle as "Phrase prediction." Off by default.
#
#   EloquencePhrasePrediction 0

# Pause shortening: control how the long pauses Eloquence emits at
# punctuation get handled. NVDA-IBMTTS-Driver originated this control.
#   0 = engine's natural long pauses everywhere
#   1 = shorten the trailing pause at end-of-utterance only
#   2 = shorten all punctuation pauses (default; matches NVDA's
#       "Shorten all pauses" mode)
#
#   EloquencePauseMode 2

# Rate boost: when on, the SSML-driven rate value is multiplied by 1.6
# before reaching the engine, extending the perceived top speed past
# the natural eciSpeed range. Useful for fast-reading screen-reader
# users. NVDA exposes the same toggle. Off by default.
#
#   EloquenceRateBoost 0

# ---- Advanced / debugging --------------------------------------------
# Backquote pass-through: by default the module sanitizes user-supplied
# text by replacing backticks ("`") with spaces so untrusted text can't
# inject ECI annotation commands (eg "`vv0" to mute). Enable only if you
# control all upstream text sources and want to hand-author ECI tags.
#
#   EloquenceBackquoteTags 0
